<a class="module-tile" href="{{ href }}">
    <span class="module-tile__icon"><i class="{{ icon }}" aria-hidden="true"></i></span>
    <span class="module-tile__body">
        <span class="module-tile__label">{{ label }}</span>
        {% if meta %}<span class="module-tile__meta">{{ meta }}</span>{% endif %}
    </span>
</a>
