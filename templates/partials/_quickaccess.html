<div class="qa-scrim" id="quick-access-sheet" aria-hidden="true">
    <section class="sheet qa-sheet" role="dialog" aria-modal="true" aria-labelledby="quick-access-sheet-title" tabindex="-1">
        <div class="sheet__grip" aria-hidden="true"></div>
        <div class="qa-sheet__head">
            <div>
                <div class="section-kicker">Pinned</div>
                <h2 class="qa-sheet__title" id="quick-access-sheet-title">Quick Access</h2>
            </div>
            <div class="qa-sheet__actions">
                <button class="qa-mini-btn" id="qa-sheet-add-current" type="button">Add shortcut</button>
                <button class="qa-mini-btn" id="qa-sheet-edit" type="button">Edit</button>
                <button class="qa-mini-btn" id="qa-sheet-close" type="button" aria-label="Close">Close</button>
            </div>
        </div>
        <div class="qa-sheet__list" id="qa-sheet-list">
            <div class="qa-sheet__state">Loading...</div>
        </div>
    </section>
</div>
